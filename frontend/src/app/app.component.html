<main class="onebook-shell">
  <header>
    <h1>{{ title() }}</h1>
    <p class="tagline">A modern nexus accounting software</p>
  </header>

  <section class="status-panel">
    <p>{{ statusMessage() }}</p>
    @if (threadInfo()) {
      <p class="thread-info">Thread: {{ threadInfo() }}</p>
    }
    <div class="component-status">
      <p>PostgreSQL: {{ postgresqlStatus() }}</p>
      <p>Redis: {{ redisStatus() }}</p>
    </div>
  </section>

  <router-outlet />

  <app-command-palette />
</main>
