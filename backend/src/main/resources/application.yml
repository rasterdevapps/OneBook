server:
  port: 8080

spring:
  application:
    name: onebook-backend

  # Enable Virtual Threads (Project Loom) - Java 21+
  threads:
    virtual:
      enabled: true

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/onebook
    username: onebook
    password: onebook_secret
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway Database Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis Configuration (Milestone 4 — Warm Cache)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# Zero-Knowledge Security Layer (Milestone 3)
# In production, set ONEBOOK_SECURITY_ENCRYPTION_MASTER_KEY env var to a
# cryptographically random 64-char hex string (256 bits). The default below
# is for local development ONLY and must never be used in production.
onebook:
  security:
    encryption:
      master-key: ${ONEBOOK_SECURITY_ENCRYPTION_MASTER_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      key-version: 1

# Actuator endpoints (Milestone 10 — Observability)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Structured Logging (Milestone 10 — Observability)
logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} [%thread] %-5level %logger{36} traceId=%X{traceId} spanId=%X{spanId} - %msg%n"
