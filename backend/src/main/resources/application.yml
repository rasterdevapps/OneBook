server:
  port: 8080

spring:
  application:
    name: onebook-backend

  # Enable Virtual Threads (Project Loom) - Java 21+
  threads:
    virtual:
      enabled: true

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/onebook
    username: onebook
    password: onebook_secret
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
