server:
  port: 8080

spring:
  application:
    name: onebook-backend

  threads:
    virtual:
      enabled: true

  # Use H2 in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  # Disable Redis for tests
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info
