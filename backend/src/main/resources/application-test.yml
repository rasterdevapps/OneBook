server:
  port: 8080

spring:
  application:
    name: onebook-backend

  threads:
    virtual:
      enabled: true

  # Use H2 in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  # Redis — not available in test but WarmCacheService degrades gracefully
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 100ms

  # Disable Flyway for unit tests (uses H2 with create-drop)
  flyway:
    enabled: false

# Zero-Knowledge Security Layer — test key (NOT for production)
onebook:
  security:
    encryption:
      master-key: aa11bb22cc33dd44ee55ff6600112233aa11bb22cc33dd44ee55ff6600112233
      key-version: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
